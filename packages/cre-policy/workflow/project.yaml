# CRE CLI project settings for the Charter compliance workflow.
# Arc is registered as an experimental chain (not yet in official chain-selectors).
# The forwarder address must be authorized on PolicyRegistry via setAttester(forwarder, true).

staging-settings:
  experimental-chains:
    - chain-selector: 5042002
      rpc-url: https://rpc.testnet.arc.network
      forwarder: "0x0000000000000000000000000000000000000000" # set to your DON's KeystoneForwarder
  rpcs:
    - chain-name: arc-testnet
      url: https://rpc.testnet.arc.network

production-settings:
  rpcs:
    - chain-name: arc-mainnet
      url: https://rpc.arc.network
