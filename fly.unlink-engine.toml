# BankOS — Unlink privacy engine (shielded ledger emulator + Arc PrivacyPool relayer).
# Deploy:  fly deploy -c fly.unlink-engine.toml
# STATEFUL: the shielded ledger lives in memory (shield -> private transfer -> withdraw all
# share in-process state), so this MUST stay a single always-on machine — never scale >1 and
# never let it auto-stop. The Arc relayer key is a Fly secret (ENGINE_PRIVATE_KEY).
app = "bankos-unlink-engine"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE = "unlink-engine"

[env]
  PORT = "8080"
  CHAIN_ID = "5042002"
  RPC_URL = "https://rpc.testnet.arc.network"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
